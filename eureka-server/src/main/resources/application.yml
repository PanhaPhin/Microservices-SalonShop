server:
  port: 8070

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: eurakserver

  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      # defaultZone: "http://${eureka.instance.hostname}:${server.port}/eureka/"
      defaultZone: "http://eurakserver:8070/eureka/"






